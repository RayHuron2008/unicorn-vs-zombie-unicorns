<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Unicorn vs Zombie Unicorns</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  font-family: system-ui, sans-serif;
}

/* Fullscreen game stage */
#stage {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  background: #000;
  overflow: hidden;
}

/* IMPORTANT:
   This stretches the actual game canvas to fill the whole screen.
   No object-fit contain. No letterbox.
*/
#game {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  background: #7ec7ff;
  z-index: 1;
  pointer-events: none;
}

/* Top HUD */
#hud {
  position: fixed;
  top: 8px;
  left: 8px;
  right: 8px;
  z-index: 20;
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
  color: #fff;
  pointer-events: none;
  font-family: monospace;
  font-weight: 700;
  text-shadow: 0 2px 4px #000;
}

.box {
  background: rgba(0,0,0,.45);
  border: 2px solid rgba(255,255,255,.25);
  border-radius: 8px;
  padding: 6px 9px;
  font-size: 13px;
  white-space: nowrap;
}

#powerWrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

#powerBar {
  width: 120px;
  height: 12px;
  background: rgba(0,0,0,.45);
  border: 2px solid rgba(255,255,255,.25);
  border-radius: 8px;
  overflow: hidden;
}

#powerFill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg,#ff4d6d,#ffa94d,#ffe066,#66ff66,#66d9ff,#b066ff);
}

/* Controls */
#controls {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 14px;
  z-index: 30;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  pointer-events: none;
}

#dpad {
  position: relative;
  width: 150px;
  height: 150px;
  pointer-events: auto;
  touch-action: none;
}

#dpad .dir {
  position: absolute;
  width: 48px;
  height: 48px;
  border-radius: 8px;
  background: rgba(20,20,20,.78);
  border: 2px solid rgba(255,255,255,.38);
  color: #fff;
  font-size: 18px;
}

#dpad .up {
  left: 51px;
  top: 0;
}

#dpad .down {
  left: 51px;
  bottom: 0;
}

#dpad .left {
  left: 0;
  top: 51px;
}

#dpad .right {
  right: 0;
  top: 51px;
}

#ab {
  display: flex;
  gap: 16px;
  pointer-events: auto;
  touch-action: none;
}

.ab {
  width: 78px;
  height: 78px;
  border-radius: 50%;
  background: rgba(20,20,20,.78);
  border: 2px solid rgba(255,255,255,.38);
  color: #fff;
  font-size: 22px;
  font-weight: 900;
}

.ab:active,
.dir:active {
  transform: scale(.96);
  background: rgba(255,255,255,.24);
}
</style>
</head>

<body>
<div id="stage">
  <canvas id="game" width="960" height="540"></canvas>
</div>

<div id="hud">
  <div class="box" id="lives">Lives: 3</div>
  <div class="box" id="score">Score: 0</div>
  <div class="box" id="time">Time: 60s</div>

  <div class="box" id="powerWrap">
    <span id="powerLabel">Power</span>
    <div id="powerBar">
      <div id="powerFill"></div>
    </div>
  </div>
</div>

<div id="controls">
  <div id="dpad">
    <button class="dir up" data-dx="0" data-dy="-1">▲</button>
    <button class="dir left" data-dx="-1" data-dy="0">◀</button>
    <button class="dir right" data-dx="1" data-dy="0">▶</button>
    <button class="dir down" data-dx="0" data-dy="1">▼</button>
  </div>

  <div id="ab">
    <button id="btnA" class="ab">A</button>
    <button id="btnB" class="ab">B</button>
  </div>
</div>

<script src="game.js?v=66"></script>
</body>
</html>
